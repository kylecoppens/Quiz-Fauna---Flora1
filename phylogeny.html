<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phylogenetic Tree — Belgian Fauna & Flora</title>
<style>
  :root {
    --bg: #0f1610;
    --panel: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --accent: #3db863;
    --accent2: #f0c05a;
    --text: #ffffff;
    --muted: #8aaa90;
    --font-h: 'Outfit', sans-serif;
    --font-b: 'Inter', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-b);
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* Import same fonts */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700;900&display=swap');

  header.top {
    background: rgba(0,0,0,0.5);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .back-link {
    color: var(--accent);
    text-decoration: none;
    font-family: var(--font-h);
    font-weight: 700;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border: 1px solid var(--accent);
    border-radius: 20px;
    transition: background 0.2s;
  }
  .back-link:hover { background: rgba(61,184,99,0.15); }

  header.top h1 {
    font-family: var(--font-h);
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
  }
  .subtitle-tag {
    font-size: 0.8rem;
    color: var(--muted);
    margin-left: auto;
    display: none;
  }

  .controls {
    padding: 16px 24px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .filter-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-h);
    font-size: 0.85rem;
    font-weight: 600;
    padding: 7px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: rgba(61,184,99,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }
  .search-box {
    margin-left: auto;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-b);
    font-size: 0.85rem;
    padding: 7px 14px;
    border-radius: 20px;
    width: 220px;
    outline: none;
  }
  .search-box:focus { border-color: var(--accent); }

  .legend {
    padding: 12px 24px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    font-size: 0.8rem;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }

  .tree-container {
    padding: 24px;
    overflow-x: auto;
    min-height: calc(100vh - 160px);
  }

  /* Tree nodes */
  .tree-root { list-style: none; }
  .tree-node { list-style: none; margin: 0; }
  .node-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0 5px 0;
    cursor: pointer;
    border-radius: 6px;
    transition: background 0.15s;
    user-select: none;
  }
  .node-row:hover { background: rgba(255,255,255,0.04); }
  .node-row.highlighted { background: rgba(61,184,99,0.1); }

  .node-indent {
    display: flex;
    align-items: center;
  }
  .node-line {
    width: 20px; height: 1px;
    background: rgba(255,255,255,0.15);
    flex-shrink: 0;
  }
  .node-vline {
    width: 1px; background: rgba(255,255,255,0.1);
    align-self: stretch; flex-shrink: 0; margin-right: 3px;
  }
  .toggle-btn {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.3);
    color: var(--muted);
    font-size: 11px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; cursor: pointer;
    transition: all 0.2s;
  }
  .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
  .spacer { width: 18px; flex-shrink: 0; }

  .node-icon { font-size: 1rem; flex-shrink: 0; }
  .node-label {
    font-family: var(--font-h);
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text);
  }
  .node-sci {
    font-style: italic;
    font-size: 0.8rem;
    color: var(--muted);
    margin-left: 4px;
  }
  .node-count {
    font-size: 0.75rem;
    color: var(--muted);
    background: rgba(255,255,255,0.06);
    padding: 1px 7px;
    border-radius: 10px;
    margin-left: 4px;
  }
  .node-tag {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Species leaf node */
  .species-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .species-row:hover { background: rgba(255,255,255,0.05); }
  .species-row.hidden { display: none; }

  .sp-thumb {
    width: 36px; height: 36px;
    border-radius: 6px;
    object-fit: cover;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.3);
    flex-shrink: 0;
  }
  .sp-info { flex: 1; min-width: 0; }
  .sp-name {
    font-weight: 600;
    font-size: 0.88rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sp-sci {
    font-style: italic;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .sp-grade {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .grade-monocot { background: rgba(240,192,90,0.2); color: var(--accent2); border: 1px solid rgba(240,192,90,0.3); }
  .grade-dicot { background: rgba(61,184,99,0.15); color: var(--accent); border: 1px solid rgba(61,184,99,0.25); }

  .children { padding-left: 20px; }
  .collapsed > .children { display: none; }

  /* Stats bar */
  .stats-bar {
    padding: 10px 24px;
    font-size: 0.8rem;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .stats-bar span { color: var(--accent); font-weight: 700; }

  /* No results */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .no-results .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
</style>
</head>

<header class="top">

  <h1>🌳 Fylogenie — Belgische Soorten</h1>

<div class="tree-container" id="tree-container">

const speciesData = window.speciesData || [];
const familyMap = {};

  const fam = sp.family || 'Unknown';
  if (!familyMap[fam]) familyMap[fam] = [];
  familyMap[fam].push(sp);
});

let currentFilter = 'all';
let searchTerm = '';
let totalVisible = 0;

// ── Render tree ──────────────────────────────────────────────────────────
function getLang() {
  // Try to read language from parent window or default to NL
  try { return window.opener?.currentLang || 'nl'; } catch(e) { return 'nl'; }
}

function getName(sp) {
  const name = sp.name;
  if (!name) return sp.scientific;
  if (typeof name === 'object') return name['nl'] || name['en'] || sp.scientific;
  return name;
}

function matchesFilter(sp) {
  if (currentFilter === 'all') return true;
  return sp.category === currentFilter;
}

function matchesSearch(sp) {
  if (!searchTerm) return true;
  const q = searchTerm.toLowerCase();
  const n = getName(sp).toLowerCase();
  return n.includes(q) || sp.scientific.toLowerCase().includes(q) || (sp.family||'').toLowerCase().includes(q);
}

function renderSpecies(sp) {
  if (!matchesFilter(sp) || !matchesSearch(sp)) return null;
  totalVisible++;

  const el = document.createElement('div');
  el.className = 'species-row';
  el.dataset.spId = sp.id;

  const catColors = {
    fauna:'#3db863', birds:'#56c4e8', insects:'#f0c05a',
    flora:'#7ec8a0', fungi:'#a07ec8', trees:'#8aaa90', agriculture:'#c8a07e'
  };
  const grade = sp.plantGrade;

  el.innerHTML = `
    <img class="sp-thumb" src="${sp.image || ''}" alt="" loading="lazy" onerror="this.style.opacity='0.3'">
    <div class="sp-info">
      <div class="sp-name">${getName(sp)}</div>
      <div class="sp-sci">${sp.scientific}</div>
    </div>
    ${grade ? `<span class="sp-grade grade-${grade}">${grade === 'monocot' ? 'Monocot' : 'Dicot'}</span>` : ''}
  `;

  el.addEventListener('click', () => {
    // Highlight + optionally open modal in parent
    document.querySelectorAll('.species-row').forEach(r => r.style.background = '');
    el.style.background = 'rgba(61,184,99,0.12)';
  });
  return el;
}

function renderFamilyGroup(familyName, depth) {
  const species = (familyMap[familyName] || []).filter(sp => matchesFilter(sp) && matchesSearch(sp));
  if (species.length === 0) return null;

  const wrap = document.createElement('li');
  wrap.className = 'tree-node';

  const row = document.createElement('div');
  row.className = 'node-row';
  row.innerHTML = `
    <div class="node-indent">${'  '.repeat(depth)}</div>
    <span class="node-icon">📦</span>
    <span class="node-label">${familyName}</span>
    <span class="node-count">${species.length}</span>
  `;
  wrap.appendChild(row);

  const childrenEl = document.createElement('ul');
  childrenEl.className = 'children';
  species.forEach(sp => {
    const li = document.createElement('li');
    li.className = 'tree-node';
    const rendered = renderSpecies(sp);
    if (rendered) { li.appendChild(rendered); childrenEl.appendChild(li); }
  });
  if (childrenEl.children.length > 0) wrap.appendChild(childrenEl);
  return wrap;
}

function countDescendants(node) {
  let count = 0;
  if (node.families) {
    node.families.forEach(f => {
      (familyMap[f] || []).forEach(sp => {
        if (matchesFilter(sp) && matchesSearch(sp)) count++;
      });
    });
  }
  if (node.children) {
    node.children.forEach(c => { count += countDescendants(c); });
  }
  return count;
}

function renderNode(node, depth = 0) {
  const count = countDescendants(node);
  if (count === 0 && node.families) return null;
  if (count === 0 && !node.children) return null;

  const li = document.createElement('li');
  li.className = 'tree-node';

  const hasChildren = (node.children || []).length > 0 || (node.families || []).length > 0;

  const row = document.createElement('div');
  row.className = 'node-row';

  const padding = depth * 20;

  const catColors = {
    fauna: '#3db863', birds: '#56c4e8', insects: '#f0c05a',
    flora: '#7ec8a0', fungi: '#a07ec8', trees: '#8aaa90'
  };
  const tagColor = node.cat ? catColors[node.cat] : null;

  row.innerHTML = `
    <div style="width:${padding}px;flex-shrink:0"></div>
    ${hasChildren && count > 0 ? `<button class="toggle-btn" onclick="toggleNode(this)">−</button>` : '<div class="spacer"></div>'}
    <span class="node-icon">${node.icon || '•'}</span>
    <span class="node-label">${node.label}</span>
    <span class="node-sci">${node.sci}</span>
    ${count > 0 ? `<span class="node-count">${count}</span>` : ''}
    ${tagColor ? `<span class="node-tag" style="background:${tagColor}22;color:${tagColor};border:1px solid ${tagColor}44">${node.cat}</span>` : ''}
  `;
  li.appendChild(row);

  if (hasChildren) {
    const childrenEl = document.createElement('ul');
    childrenEl.className = 'children tree-root';
    childrenEl.style.paddingLeft = '0';

    // Render family leaves
    if (node.families) {
      node.families.forEach(fam => {
        const famNode = renderFamilyGroup(fam, depth + 1);
        if (famNode) childrenEl.appendChild(famNode);
      });
    }

    // Render child nodes
    if (node.children) {
      node.children.forEach(child => {
        const childEl = renderNode(child, depth + 1);
        if (childEl) childrenEl.appendChild(childEl);
      });
    }

    if (childrenEl.children.length > 0) {
      li.appendChild(childrenEl);
    }
  }

  return li;
}

function toggleNode(btn) {
  const li = btn.closest('.tree-node');
  const isCollapsed = li.classList.toggle('collapsed');
  btn.textContent = isCollapsed ? '+' : '−';
}

function renderTree() {
  totalVisible = 0;
  const container = document.getElementById('tree-container');
  const noResults = document.getElementById('no-results');
  container.innerHTML = '';
  container.appendChild(noResults);
  noResults.style.display = 'none';

  const ul = document.createElement('ul');
  ul.className = 'tree-root';

  TREE_TEMPLATE.children.forEach(child => {
    const el = renderNode(child, 0);
    if (el) ul.appendChild(el);
  });

  container.appendChild(ul);

  if (totalVisible === 0) {
    noResults.style.display = 'block';
  }

  document.getElementById('stats-bar').innerHTML =
    `<span>${totalVisible}</span> soorten zichtbaar · <span>${speciesData.length}</span> totaal in dataset`;
}

// ── Controls ─────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderTree();
  });
});

document.getElementById('phylo-search').addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  renderTree();
  // Auto-expand all when searching
  if (searchTerm) {
    document.querySelectorAll('.tree-node.collapsed').forEach(n => {
      n.classList.remove('collapsed');
      const btn = n.querySelector('.toggle-btn');
      if (btn) btn.textContent = '−';
    });
  }
});

// Initial render
renderTree();
</script>
</body>
</html>
